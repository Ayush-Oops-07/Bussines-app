services:
  - type: web
    name: sandeep-traders
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sandeep-traders-db
          property: connectionString

databases:
  - name: sandeep-traders-db
    databaseName: sandeep_traders
    user: sandeep_user
    plan: free
